name: thermoptic-upstream-noproxy

services:
  proxyrouter:
    container_name: thermoptic-upstream-noproxy-proxyrouter
    environment:
      UPSTREAM_PROXY: ""
  chrome:
    container_name: thermoptic-upstream-noproxy-chrome
    environment:
      ENABLE_GUI_CONTROL: "true"
      XPRA_PORT: 14099
    ports:
      - "127.0.0.1:14099:14099"
  thermoptic:
    container_name: thermoptic-upstream-noproxy
    ports:
      - "127.0.0.1:13099:1234"
